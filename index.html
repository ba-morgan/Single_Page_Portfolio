<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Morgan Web Development</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Morgan Web Development portfolio. A single-page showcase of projects, skills, and contact details."
    />

    <meta property="og:title" content="Morgan Web Development" />
    <meta
      property="og:description"
      content="A single-page portfolio showcasing projects, skills, and ways to connect."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./images/Single_Page_Portfolio_ScreenShot.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Morgan Web Development" />
    <meta
      name="twitter:description"
      content="A single-page portfolio showcasing projects, skills, and ways to connect."
    />
    <meta name="twitter:image" content="./images/Single_Page_Portfolio_ScreenShot.png" />

    <!-- #### Favourite Icon Image #### -->
    <link
      rel="shortcut icon"
      href="./images/favicon.ico"
      type="image/x-icon"
    />
    <!-- #### Font Awesome V6 Kit #### -->
    <script
      src="https://kit.fontawesome.com/9c406554d7.js"
      crossorigin="anonymous"
    ></script>

    <!-- #### Google Fonts #### -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Bitter:ital,wght@0,100;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- #### CSS Sheet Link #### -->
    <link href="./style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- #### Theme Toggle #### -->
    <div class="theme-toggle" id="theme-toggle" title="" aria-label="">
      <i class="fas fa-moon"></i>
    </div>

    <main class="container">
      <section class="sect_1">
        <div class="image one" data-project-id="bugify"></div>
      </section>
      <section class="sect_2">
        <section class="textBox" id="profile-section">
          <h1 class="name-title" id="profile-name"></h1>
          <h3 id="profile-subtitle"></h3>
          <!-- ##########   Profile Section ########## -->
          <h4 id="profile-headline"></h4>
          <div id="profile-paragraphs"></div>
        </section>
      </section>
      <!-- ##########   DevShed Project Link  ########## -->
      <section class="sect_3">
        <div class="image three" data-project-id="devshed"></div>
      </section>
      <!-- ##########   Skills Badges Section  ########## -->
      <section class="skills-badges">
        <div class="skillsContainer" id="skills-badges"></div>
      </section>

      <!-- ##########   Contact Section  ########## -->
      <section class="contact">
        <div class="contact-text" id="contact-text"></div>
        <div class="contactsContainer" id="contacts-container"></div>
      </section>
      <!-- ##########   Skills Section  ########## -->
      <section class="sect_4">
        <section class="textBox" id="skills-section">
          <h1 id="skills-title"></h1>
          <div id="skills-paragraphs"></div>
        </section>
      </section>

      <!-- ##########   Portfolio Project Link  ########## -->
      <section class="sect_5">
        <div id="portfolio-content" class="image two" data-project-id="portfolio"></div>

        <!-- Contact Form Container (Initially Hidden) -->
        <div id="contact-form-container" aria-hidden="true">
          <button type="button" class="close-button" aria-label="Close contact form">&times;</button>
          <form id="contact-form" action="" method="POST">
            <h2 id="contact-form-title"></h2>
            <div class="form-group">
              <input type="text" name="name" placeholder="" required />
            </div>
            <div class="form-group">
              <input type="email" name="email" placeholder="" required />
            </div>
            <div class="form-group">
              <textarea name="message" placeholder="" required></textarea>
            </div>
            <button type="submit" id="submit-btn"></button>
            <div id="form-status" aria-live="polite"></div>
          </form>
        </div>
      </section>

      <!-- ##########   Experience Section  ########## -->
      <section class="sect_6">
        <section class="textBox" id="more-section">
          <h1 id="more-title"></h1>
          <div id="more-paragraphs"></div>
        </section>
      </section>

      <!-- ##########   Footer  ########## -->
      <footer class="footer">
        <span id="footer-text"></span>
      </footer>
    </main>

    <!-- #### Theme Toggle & Contact Form Scripts #### -->
    <script src="./script.js" defer></script>
  </body>
</html>
